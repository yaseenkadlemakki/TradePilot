name: iOS CI
on:
  push:
    branches: [main]
    paths: ['tradepilot-ios/**']
  pull_request:
    paths: ['tradepilot-ios/**']
jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Build
        run: |
          cd tradepilot-ios
          xcodebuild build \
            -scheme TradePilot \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGNING_ALLOWED=NO
      - name: Test
        run: |
          cd tradepilot-ios
          xcodebuild test \
            -scheme TradePilot \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGNING_ALLOWED=NO
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint
        run: |
          brew install swiftlint
          cd tradepilot-ios && swiftlint --strict
